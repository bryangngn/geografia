<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMaster Europa - Real</title>
    <style>
        :root {
            --water: #1a2b3c;
            --land: #e0e0e0;
            --accent: #3498db;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --selected: #f1c40f;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--water); color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; text-align: center; background: rgba(0,0,0,0.8);
            z-index: 10; border-bottom: 2px solid var(--accent);
        }

        #target-name {
            display: block; font-size: 1.6rem; font-weight: 900; color: var(--accent);
            text-transform: uppercase;
        }

        #game-viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #map-wrapper {
            width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }

        svg {
            width: 95%; height: 95%;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }

        /* ESTILO DE LOS PAÍSES REALES */
        .country {
            fill: var(--land);
            stroke: #2c3e50;
            stroke-width: 0.8;
            cursor: pointer;
            transition: fill 0.2s;
            pointer-events: all;
        }

        /* PANEL DE CONFIRMACIÓN */
        #ui-confirm {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: #333; padding: 15px 25px; border-radius: 20px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; text-align: center; width: 80%; max-width: 300px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; border: none; padding: 12px; border-radius: 10px;
            font-weight: bold; color: white; cursor: pointer;
        }
        .btn-ok { background: var(--correct); }
        .btn-no { background: var(--wrong); }
    </style>
</head>
<body>

<header>
    ¿DÓNDE ESTÁ?
    <span id="target-name">...</span>
</header>

<div id="game-viewport">
    <div id="map-wrapper">
        <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
            <g id="europe-detailed">
                <path id="es" data-name="España" class="country" d="M120,450 L145,435 L190,430 L220,435 L245,450 L250,480 L235,520 L200,535 L140,530 L115,500 L110,470 Z" />
                <path id="pt" data-name="Portugal" class="country" d="M110,470 L125,445 L135,445 L140,530 L115,530 Z" />
                <path id="fr" data-name="Francia" class="country" d="M220,435 L205,380 L230,340 L260,320 L310,330 L340,360 L355,420 L310,460 L245,450 Z" />
                <path id="it" data-name="Italia" class="country" d="M340,415 L370,410 L395,470 L440,540 L460,570 L430,585 L390,550 L405,480 L355,435 Z" />
                <path id="gb" data-name="Reino Unido" class="country" d="M195,330 L230,300 L240,250 L220,210 L185,230 L175,280 Z" />
                <path id="ie" data-name="Irlanda" class="country" d="M140,290 L170,270 L170,320 L145,330 Z" />
                <path id="de" data-name="Alemania" class="country" d="M310,330 L370,320 L390,260 L340,245 L305,270 Z" />
                <path id="no" data-name="Noruega" class="country" d="M340,245 L370,180 L400,100 L430,60 L450,110 L390,260 Z" />
                
                <circle id="ad" data-name="Andorra" class="country" cx="232" cy="438" r="6" />
                <circle id="lu" data-name="Luxemburgo" class="country" cx="312" cy="335" r="6" />
                <circle id="va" data-name="Vaticano" class="country" cx="400" cy="495" r="5" />
            </g>
        </svg>
    </div>

    <div id="ui-confirm">
        <div id="selection-text">¿Es este país?</div>
        <div class="btn-group">
            <button class="btn btn-no" onclick="cancelSelection()">NO</button>
            <button class="btn btn-ok" onclick="checkSelection()">SÍ</button>
        </div>
    </div>
</div>

<script>
    const countries = [
        {id: 'es', name: 'España'}, {id: 'fr', name: 'Francia'},
        {id: 'it', name: 'Italia'}, {id: 'de', name: 'Alemania'},
        {id: 'pt', name: 'Portugal'}, {id: 'gb', name: 'Reino Unido'},
        {id: 'no', name: 'Noruega'}, {id: 'ad', name: 'Andorra'},
        {id: 'va', name: 'Vaticano'}
    ];

    let target = null;
    let selectedEl = null;
    const wrapper = document.getElementById('map-wrapper');
    const ui = document.getElementById('ui-confirm');

    function init() {
        target = countries[Math.floor(Math.random() * countries.length)];
        document.getElementById('target-name').innerText = target.name;
        
        document.querySelectorAll('.country').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                select(el);
            };
        });
    }

    function select(el) {
        if (selectedEl) selectedEl.style.fill = "";
        selectedEl = el;
        selectedEl.style.fill = "var(--selected)";
        
        // --- ESTRATAGEMA DE ZOOM ---
        const bbox = el.getBBox();
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;
        
        // Zoom muy fuerte si es un país pequeño
        const isSmall = (el.tagName === 'circle');
        const zoom = isSmall ? 5 : 2.5;

        wrapper.style.transformOrigin = `${centerX}px ${centerY}px`;
        wrapper.style.transform = `scale(${zoom})`;

        document.getElementById('selection-text').innerText = "¿Es " + el.getAttribute('data-name') + "?";
        ui.style.display = "block";
    }

    function checkSelection() {
        if (selectedEl.id === target.id) {
            alert("¡CORRECTO!");
            selectedEl.style.fill = "var(--correct)";
            setTimeout(resetGame, 1000);
        } else {
            alert("NO, ESE ES " + selectedEl.getAttribute('data-name').toUpperCase());
            cancelSelection();
        }
    }

    function cancelSelection() {
        if (selectedEl) selectedEl.style.fill = "";
        selectedEl = null;
        ui.style.display = "none";
        wrapper.style.transform = "scale(1)";
    }

    function resetGame() {
        cancelSelection();
        init();
    }

    init();
</script>
</body>
</html>
