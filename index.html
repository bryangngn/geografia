<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMaster - Mapa Real</title>
    <style>
        :root {
            --accent: #3498db;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }

        body {
            margin: 0; font-family: sans-serif; background: #1a1a1a; color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; text-align: center; background: #2c3e50; z-index: 10;
        }

        #target-name {
            display: block; font-size: 1.5rem; font-weight: bold; color: var(--accent);
        }

        #viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* CAPA DEL MAPA (IMAGEN REAL) */
        #map-container {
            position: relative;
            width: 800px; /* Tamaño base */
            height: 600px;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Europe_political_map_blank.svg/800px-Europe_political_map_blank.svg.png');
            background-size: contain;
            background-repeat: no-repeat;
            transition: transform 0.5s ease;
        }

        /* CAPA DE INTERACCIÓN (TRANSPARENTE) */
        .touch-zone {
            position: absolute;
            background: rgba(255, 255, 255, 0); /* Invisible */
            border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .touch-zone:active {
            background: rgba(52, 152, 219, 0.3);
        }

        /* PANEL MÓVIL */
        #confirm-ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; color: #333; padding: 15px; border-radius: 20px;
            display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 100;
        }

        .btn { border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: bold; }
        .btn-ok { background: var(--correct); }
        .btn-no { background: var(--wrong); }
    </style>
</head>
<body>

<header>
    ¿Dónde está? <span id="target-name">...</span>
</header>

<div id="viewport">
    <div id="map-container" id="map">
        <div class="touch-zone" data-id="es" data-name="España" style="top: 73%; left: 12%; width: 12%; height: 12%;"></div>
        <div class="touch-zone" data-id="fr" data-name="Francia" style="top: 58%; left: 23%; width: 12%; height: 12%;"></div>
        <div class="touch-zone" data-id="it" data-name="Italia" style="top: 68%; left: 38%; width: 8%; height: 15%;"></div>
        <div class="touch-zone" data-id="gb" data-name="Reino Unido" style="top: 40%; left: 18%; width: 8%; height: 12%;"></div>
        <div class="touch-zone" data-id="de" data-name="Alemania" style="top: 48%; left: 35%; width: 8%; height: 10%;"></div>
        <div class="touch-zone" data-id="no" data-name="Noruega" style="top: 15%; left: 38%; width: 5%; height: 25%;"></div>
        
        <div class="touch-zone" data-id="ad" data-name="Andorra" style="top: 71%; left: 24.5%; width: 4%; height: 4%; border-radius: 50%; border: 2px solid gold;"></div>
    </div>

    <div id="confirm-ui">
        <div id="selection-text"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn btn-no" onclick="deselect()">NO</button>
            <button class="btn btn-ok" onclick="check()">SÍ</button>
        </div>
    </div>
</div>

<script>
    const countries = [
        {id:'es', name:'España'}, {id:'fr', name:'Francia'},
        {id:'it', name:'Italia'}, {id:'gb', name:'Reino Unido'},
        {id:'de', name:'Alemania'}, {id:'ad', name:'Andorra'}
    ];

    let target = null;
    let selected = null;
    const container = document.getElementById('map-container');

    function init() {
        target = countries[Math.floor(Math.random() * countries.length)];
        document.getElementById('target-name').innerText = target.name;
        
        document.querySelectorAll('.touch-zone').forEach(zone => {
            zone.onclick = (e) => {
                selected = { id: zone.dataset.id, name: zone.dataset.name };
                
                // LA ESTRATAGEMA: ZOOM AL CENTRO DE LA ZONA DE TOQUE
                const top = parseFloat(zone.style.top);
                const left = parseFloat(zone.style.left);
                container.style.transformOrigin = `${left}% ${top}%`;
                container.style.transform = "scale(2.5)";
                
                document.getElementById('selection-text').innerText = "¿Es " + selected.name + "?";
                document.getElementById('confirm-ui').style.display = "block";
            };
        });
    }

    function check() {
        if (selected.id === target.id) {
            alert("¡Correcto!");
            deselect();
            init();
        } else {
            alert("No, ese es " + selected.name);
            deselect();
        }
    }

    function deselect() {
        container.style.transform = "scale(1)";
        document.getElementById('confirm-ui').style.display = "none";
    }

    init();
</script>
</body>
</html>
