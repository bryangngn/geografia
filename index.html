<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMaster Pro - Europa Real</title>
    <style>
        :root {
            --water: #1a2a3a;
            --land: #d1d8e0;
            --accent: #3498db;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --selected: #f1c40f;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--water); color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 20px; text-align: center; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); z-index: 10; border-bottom: 2px solid var(--accent);
        }

        #target-name {
            display: block; font-size: 1.8rem; font-weight: 900;
            color: var(--accent); text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        #game-viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* Contenedor del mapa */
        #map-container {
            width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: center; justify-content: center;
        }

        /* Estilo para el SVG inyectado */
        svg {
            width: 90%; height: 90%;
            touch-action: none;
        }

        path {
            fill: var(--land);
            stroke: #444;
            stroke-width: 0.5;
            transition: fill 0.3s;
            cursor: pointer;
        }

        /* Panel de confirmación */
        #ui-confirm {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: white; color: #333; padding: 20px; border-radius: 30px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; text-align: center; width: 80%; max-width: 300px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            flex: 1; border: none; padding: 12px; border-radius: 15px;
            font-weight: bold; font-size: 1rem; cursor: pointer; color: white;
        }
        .btn-ok { background: var(--correct); }
        .btn-no { background: var(--wrong); }

        #msg {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 10px; font-weight: bold; display: none;
            z-index: 200; text-shadow: none;
        }
    </style>
</head>
<body>

<header>
    ¿Dónde está?
    <span id="target-name">CARGANDO MAPA...</span>
</header>

<div id="msg"></div>

<div id="game-viewport">
    <div id="map-container">
        </div>

    <div id="ui-confirm">
        <div id="selection-text">¿Es este país?</div>
        <div class="btn-group">
            <button class="btn btn-no" onclick="cancelSelection()">NO</button>
            <button class="btn btn-ok" onclick="checkSelection()">SÍ</button>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('map-container');
    const ui = document.getElementById('ui-confirm');
    const targetLabel = document.getElementById('target-name');
    
    let selectedElement = null;
    let currentCountryObj = null;

    // Lista de países basada en las IDs reales del SVG de Wikipedia
    const countries = [
        { id: 'fr', name: 'Francia' },
        { id: 'es', name: 'España' },
        { id: 'it', name: 'Italia' },
        { id: 'de', name: 'Alemania' },
        { id: 'pt', name: 'Portugal' },
        { id: 'gb', name: 'Reino Unido' },
        { id: 'ie', name: 'Irlanda' },
        { id: 'gr', name: 'Grecia' },
        { id: 'no', name: 'Noruega' },
        { id: 'se', name: 'Suecia' },
        { id: 'pl', name: 'Polonia' },
        { id: 'ch', name: 'Suiza' },
        { id: 'be', name: 'Bélgica' }
    ];

    // CARGA DEL MAPA MEDIANTE FETCH (Evita el problema del objeto externo)
    async function loadMap() {
        try {
            const response = await fetch('https://upload.wikimedia.org/wikipedia/commons/5/5e/Europe_blank_laea_location_map.svg');
            const svgText = await response.text();
            container.innerHTML = svgText;
            setupInteractivity();
            nextQuestion();
        } catch (error) {
            targetLabel.innerText = "Error al cargar mapa";
            console.error(error);
        }
    }

    function setupInteractivity() {
        const svg = container.querySelector('svg');
        const paths = svg.querySelectorAll('path');
        
        paths.forEach(p => {
            // Limpiamos estilos de Wikipedia
            p.removeAttribute('style');
            p.classList.add('country-path');
            
            p.addEventListener('click', (e) => {
                e.stopPropagation();
                highlight(p);
            });
        });
    }

    function highlight(el) {
        if (selectedElement) selectedElement.style.fill = "";
        
        selectedElement = el;
        selectedElement.style.fill = "var(--selected)";

        // ESTRATAGEMA MOVIL: Zoom dinámico
        const bbox = el.getBBox();
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;
        
        // Si el país es pequeño, zoom 5x, si no 2x
        const zoomLevel = bbox.width < 30 ? 5 : 2;
        
        container.style.transformOrigin = `${centerX}px ${centerY}px`;
        container.style.transform = `scale(${zoomLevel})`;

        ui.style.display = "block";
    }

    function cancelSelection() {
        if (selectedElement) selectedElement.style.fill = "";
        selectedElement = null;
        ui.style.display = "none";
        container.style.transform = "scale(1)";
    }

    function checkSelection() {
        // Obtenemos la ID del país tocado (Wikipedia usa ISO 3166-1 alpha-2 en minúsculas)
        const selectedId = selectedElement.id.toLowerCase();

        if (selectedId === currentCountryObj.id) {
            showMsg("¡CORRECTO!", "var(--correct)");
            selectedElement.style.fill = "var(--correct)";
            setTimeout(nextQuestion, 1500);
        } else {
            showMsg("Ese no es...", "var(--wrong)");
            selectedElement.style.fill = "var(--wrong)";
            setTimeout(cancelSelection, 1000);
        }
        ui.style.display = "none";
    }

    function nextQuestion() {
        currentCountryObj = countries[Math.floor(Math.random() * countries.length)];
        targetLabel.innerText = currentCountryObj.name;
        container.style.transform = "scale(1)";
        if(selectedElement) selectedElement.style.fill = "";
        selectedElement = null;
    }

    function showMsg(txt, color) {
        const m = document.getElementById('msg');
        m.innerText = txt;
        m.style.backgroundColor = color;
        m.style.display = "block";
        setTimeout(() => m.style.display = "none", 1500);
    }

    loadMap();
</script>

</body>
</html>
