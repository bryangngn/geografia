<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMaster Pro - Europa</title>
    <style>
        :root {
            --water: #1a2a3a;
            --land: #d1d8e0;
            --accent: #3498db;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --selected: #f1c40f;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--water); color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; text-align: center; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px); z-index: 10; border-bottom: 2px solid var(--accent);
        }

        #target-name {
            display: block; font-size: 1.8rem; font-weight: 900;
            color: var(--accent); text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        #game-viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #map-container {
            width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; align-items: center; justify-content: center;
        }

        svg {
            width: 95%; height: 95%;
            touch-action: none;
        }

        /* Estilo de los países */
        path {
            fill: var(--land);
            stroke: #333;
            stroke-width: 0.5;
            transition: fill 0.3s;
            cursor: pointer;
            pointer-events: all;
        }

        #ui-confirm {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: #333; padding: 20px; border-radius: 25px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; text-align: center; width: 80%; max-width: 300px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            flex: 1; border: none; padding: 12px; border-radius: 15px;
            font-weight: bold; cursor: pointer; color: white;
        }
        .btn-ok { background: var(--correct); }
        .btn-no { background: var(--wrong); }

        #msg {
            position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; border-radius: 10px; font-weight: bold; display: none; z-index: 50;
        }
    </style>
</head>
<body>

<header>
    ¿Dónde está?
    <span id="target-name">CARGANDO...</span>
</header>

<div id="msg"></div>

<div id="game-viewport">
    <div id="map-container">
        <svg viewBox="0 0 1000 750" id="europe-svg">
            <g id="countries-group">
                <path id="es" data-name="España" d="M140,580 L180,560 L240,570 L260,620 L240,680 L160,700 L120,680 L110,620 Z" />
                <path id="pt" data-name="Portugal" d="M110,620 L130,600 L135,690 L110,695 Z" />
                <path id="fr" data-name="Francia" d="M240,570 L230,480 L280,450 L380,470 L400,550 L340,620 L260,620 Z" />
                <path id="it" data-name="Italia" d="M380,550 L430,550 L460,620 L520,740 L480,770 L430,730 L450,620 L400,580 Z" />
                <path id="de" data-name="Alemania" d="M380,470 L340,430 L350,330 L450,320 L480,450 Z" />
                <path id="gb" data-name="Reino Unido" d="M220,400 L280,350 L270,260 L200,240 L180,330 Z" />
                <path id="ie" data-name="Irlanda" d="M130,350 L170,320 L165,390 L130,395 Z" />
                <path id="no" data-name="Noruega" d="M380,320 L420,180 L480,50 L530,20 L580,100 L450,320 Z" />
                <path id="gr" data-name="Grecia" d="M550,680 L620,680 L640,770 L600,790 L550,750 Z" />
                
                <circle id="ad" data-name="Andorra" cx="245" cy="575" r="7" />
                <circle id="lu" data-name="Luxemburgo" cx="375" cy="475" r="7" />
                <circle id="va" data-name="Vaticano" cx="445" cy="630" r="6" />
            </g>
        </svg>
    </div>

    <div id="ui-confirm">
        <div id="selection-text">¿Es este país?</div>
        <div class="btn-group">
            <button class="btn btn-no" onclick="cancelSelection()">NO</button>
            <button class="btn btn-ok" onclick="checkSelection()">SÍ</button>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('map-container');
    const ui = document.getElementById('ui-confirm');
    const targetLabel = document.getElementById('target-name');
    
    let selectedElement = null;
    let currentCountryObj = null;

    const countries = [
        { id: 'fr', name: 'Francia' }, { id: 'es', name: 'España' },
        { id: 'it', name: 'Italia' }, { id: 'de', name: 'Alemania' },
        { id: 'pt', name: 'Portugal' }, { id: 'gb', name: 'Reino Unido' },
        { id: 'ie', name: 'Irlanda' }, { id: 'no', name: 'Noruega' },
        { id: 'ad', name: 'Andorra' }, { id: 'va', name: 'Vaticano' }
    ];

    function init() {
        const paths = document.querySelectorAll('path, circle');
        paths.forEach(p => {
            p.onclick = (e) => {
                e.stopPropagation();
                highlight(p);
            };
        });
        nextQuestion();
    }

    function highlight(el) {
        if (selectedElement) selectedElement.style.fill = "";
        selectedElement = el;
        selectedElement.style.fill = "var(--selected)";

        // ESTRATAGEMA MOVIL: Zoom centrado
        const bbox = el.getBBox();
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;
        const zoom = bbox.width < 25 ? 4 : 2;

        container.style.transformOrigin = `${centerX}px ${centerY}px`;
        container.style.transform = `scale(${zoom})`;

        document.getElementById('selection-text').innerText = "¿Es " + el.getAttribute('data-name') + "?";
        ui.style.display = "block";
    }

    function checkSelection() {
        if (selectedElement.id === currentCountryObj.id) {
            showMsg("¡CORRECTO!", "var(--correct)");
            selectedElement.style.fill = "var(--correct)";
            setTimeout(nextQuestion, 1200);
        } else {
            showMsg("No, es " + selectedElement.getAttribute('data-name'), "var(--wrong)");
            selectedElement.style.fill = "var(--wrong)";
            setTimeout(cancelSelection, 1000);
        }
        ui.style.display = "none";
    }

    function cancelSelection() {
        if (selectedElement) selectedElement.style.fill = "";
        selectedElement = null;
        ui.style.display = "none";
        container.style.transform = "scale(1)";
    }

    function nextQuestion() {
        currentCountryObj = countries[Math.floor(Math.random() * countries.length)];
        targetLabel.innerText = currentCountryObj.name;
        cancelSelection();
    }

    function showMsg(txt, color) {
        const m = document.getElementById('msg');
        m.innerText = txt;
        m.style.backgroundColor = color;
        m.style.display = "block";
        setTimeout(() => m.style.display = "none", 1500);
    }

    init();
</script>
</body>
</html>
