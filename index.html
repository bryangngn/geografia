<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMaster - Europa</title>
    <style>
        :root {
            --water: #243447;
            --land: #e1e8ed;
            --accent: #1da1f2;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --selected: #f1c40f;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--water); color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; text-align: center; background: rgba(0,0,0,0.8);
            z-index: 10; border-bottom: 2px solid var(--accent);
        }

        #target-display {
            display: block; font-size: 1.6rem; font-weight: 900; color: var(--accent);
        }

        #viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #map-scroll {
            width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }

        svg {
            width: 90%; height: 90%;
            max-height: 80vh;
        }

        .country {
            fill: var(--land);
            stroke: #2c3e50;
            stroke-width: 1;
            transition: fill 0.3s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* UI de Confirmación */
        #ui-confirm {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: #333; padding: 15px 25px; border-radius: 25px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; text-align: center; width: 80%; max-width: 300px;
        }

        .btn-box { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; border: none; padding: 12px; border-radius: 12px;
            font-weight: bold; font-size: 1rem; color: white;
        }
        .btn-yes { background: var(--correct); }
        .btn-no { background: var(--wrong); }
    </style>
</head>
<body>

<header>
    Localiza el país:
    <span id="target-display">Cargando...</span>
</header>

<div id="viewport">
    <div id="map-scroll">
        <svg viewBox="0 0 800 600" id="europe-svg">
            <g id="main-map">
                <path id="es" data-name="España" class="country" d="M110,430 L185,410 L230,425 L245,460 L230,520 L130,510 L100,470 Z" />
                <path id="pt" data-name="Portugal" class="country" d="M100,470 L125,435 L130,510 L105,510 Z" />
                <path id="fr" data-name="Francia" class="country" d="M230,425 L215,350 L250,310 L340,325 L360,400 L310,460 L245,460 Z" />
                <path id="it" data-name="Italia" class="country" d="M345,405 L380,405 L410,480 L460,570 L420,590 L380,550 L400,470 L355,425 Z" />
                <path id="gb" data-name="Reino Unido" class="country" d="M190,300 L235,270 L245,210 L210,180 L180,210 L185,260 Z" />
                <path id="ie" data-name="Irlanda" class="country" d="M140,270 L175,250 L170,300 L145,305 Z" />
                <path id="de" data-name="Alemania" class="country" d="M320,320 L375,310 L400,240 L350,225 L320,260 Z" />
                <path id="no" data-name="Noruega" class="country" d="M350,225 L380,140 L420,60 L450,40 L480,110 L390,240 Z" />
                
                <circle id="ad" data-name="Andorra" class="country" cx="232" cy="428" r="7" />
                <circle id="lu" data-name="Luxemburgo" class="country" cx="325" cy="328" r="6" />
                <circle id="va" data-name="Vaticano" class="country" cx="395" cy="485" r="5" />
            </g>
        </svg>
    </div>

    <div id="ui-confirm">
        <div id="confirm-text">¿Es este país?</div>
        <div class="btn-box">
            <button class="btn btn-no" onclick="cancelSelection()">NO</button>
            <button class="btn btn-yes" onclick="checkAnswer()">SÍ</button>
        </div>
    </div>
</div>

<script>
    const countries = [
        {id: 'es', name: 'España'}, {id: 'fr', name: 'Francia'},
        {id: 'it', name: 'Italia'}, {id: 'pt', name: 'Portugal'},
        {id: 'gb', name: 'Reino Unido'}, {id: 'de', name: 'Alemania'},
        {id: 'no', name: 'Noruega'}, {id: 'ad', name: 'Andorra'},
        {id: 'lu', name: 'Luxemburgo'}, {id: 'va', name: 'Vaticano'}
    ];

    let target = null;
    let selected = null;
    const mapScroll = document.getElementById('map-scroll');
    const ui = document.getElementById('ui-confirm');

    function init() {
        target = countries[Math.floor(Math.random() * countries.length)];
        document.getElementById('target-display').innerText = target.name;
        
        document.querySelectorAll('.country').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                selectCountry(el);
            };
        });
    }

    function selectCountry(el) {
        if (selected) selected.style.fill = "";
        selected = el;
        selected.style.fill = "var(--selected)";
        
        // ESTRATAGEMA: ZOOM Y CENTRADO
        const bbox = el.getBBox();
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;
        
        // Zoom agresivo para países pequeños (Andorra, Vaticano...)
        const isSmall = (el.tagName === 'circle' || bbox.width < 20);
        const zoomScale = isSmall ? 5 : 2.2;

        mapScroll.style.transformOrigin = `${centerX}px ${centerY}px`;
        mapScroll.style.transform = `scale(${zoomScale})`;

        document.getElementById('confirm-text').innerText = "¿Es " + el.getAttribute('data-name') + "?";
        ui.style.display = "block";
    }

    function checkAnswer() {
        if (selected.id === target.id) {
            selected.style.fill = "var(--correct)";
            alert("¡Excelente! Es " + target.name);
            setTimeout(resetGame, 500);
        } else {
            selected.style.fill = "var(--wrong)";
            alert("Oops... ese es " + selected.getAttribute('data-name'));
            cancelSelection();
        }
    }

    function cancelSelection() {
        if (selected) selected.style.fill = "";
        selected = null;
        ui.style.display = "none";
        mapScroll.style.transform = "scale(1)";
    }

    function resetGame() {
        cancelSelection();
        init();
    }

    init();
</script>
</body>
</html>
