<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMaster Siluetas Real</title>
    <style>
        :root {
            --water: #1a2a3a;
            --land: #dfe6e9;
            --accent: #3498db;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --selected: #f1c40f;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--water); color: white;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px; text-align: center; background: rgba(0,0,0,0.8);
            z-index: 10; border-bottom: 2px solid var(--accent);
        }

        #target-name {
            display: block; font-size: 1.6rem; font-weight: 900; color: var(--accent);
        }

        #game-viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #map-wrapper {
            width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }

        svg {
            width: 95%; height: 95%;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }

        /* ESTILO DE LAS SILUETAS REALES */
        .country {
            fill: var(--land);
            stroke: #2c3e50;
            stroke-width: 0.5;
            transition: fill 0.2s;
            cursor: pointer;
            pointer-events: all;
        }

        /* PANEL DE CONFIRMACIÓN */
        #ui-confirm {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: #333; padding: 15px 25px; border-radius: 20px;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100; text-align: center; width: 80%; max-width: 300px;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; border: none; padding: 12px; border-radius: 10px;
            font-weight: bold; color: white; cursor: pointer;
        }
        .btn-ok { background: var(--correct); }
        .btn-no { background: var(--wrong); }
    </style>
</head>
<body>

<header>
    ¿DÓNDE ESTÁ?
    <span id="target-name">CARGANDO...</span>
</header>

<div id="game-viewport">
    <div id="map-wrapper">
        <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
            <g id="europe-paths">
                <path id="es" data-name="España" class="country" d="M165,648l16-24l40-7l56,14l18,59l-23,65l-121-17l-19-54L165,648z" />
                <path id="pt" data-name="Portugal" class="country" d="M127,683l38-35l18,87l-37,1l-19-53z" />
                <path id="fr" data-name="Francia" class="country" d="M277,631l-28-16l20-105l46-57l113,22l25,89l-53,73L277,631z" />
                <path id="it" data-name="Italia" class="country" d="M446,586l44,0l41,113l53,129l-54,42l-56-41l21-133L446,586z" />
                <path id="gb" data-name="Reino Unido" class="country" d="M210,396l75-54l-11-113l-65-35l-32,89L210,396z" />
                <path id="de" data-name="Alemania" class="country" d="M408,476l109-24l31-178l-93-22l-54,43L408,476z" />
                <path id="no" data-name="Noruega" class="country" d="M456,253l54-89l33-169l43-49l33,89l-109,218L456,253z" />
                <path id="gr" data-name="Grecia" class="country" d="M660,771l56,0l18,86l-43,22l-54-54L660,771z" />
                
                <circle id="ad" data-name="Andorra" class="country" cx="280" cy="635" r="8" />
                <circle id="lu" data-name="Luxemburgo" class="country" cx="403" cy="482" r="7" />
                <circle id="va" data-name="Vaticano" class="country" cx="496" cy="708" r="6" />
            </g>
        </svg>
    </div>

    <div id="ui-confirm">
        <div id="selection-text"></div>
        <div class="btn-group">
            <button class="btn btn-no" onclick="cancelSelection()">NO</button>
            <button class="btn btn-ok" onclick="checkSelection()">SÍ</button>
        </div>
    </div>
</div>

<script>
    const countries = [
        {id: 'es', name: 'España'}, {id: 'fr', name: 'Francia'},
        {id: 'it', name: 'Italia'}, {id: 'de', name: 'Alemania'},
        {id: 'gb', name: 'Reino Unido'}, {id: 'no', name: 'Noruega'},
        {id: 'pt', name: 'Portugal'}, {id: 'ad', name: 'Andorra'},
        {id: 'va', name: 'Vaticano'}
    ];

    let target = null;
    let selectedEl = null;
    const wrapper = document.getElementById('map-wrapper');
    const ui = document.getElementById('ui-confirm');

    function init() {
        target = countries[Math.floor(Math.random() * countries.length)];
        document.getElementById('target-name').innerText = target.name;
        
        document.querySelectorAll('.country').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                select(el);
            };
        });
    }

    function select(el) {
        if (selectedEl) selectedEl.style.fill = "";
        selectedEl = el;
        selectedEl.style.fill = "var(--selected)";
        
        // --- ESTRATAGEMA DE ZOOM ---
        const bbox = el.getBBox();
        const centerX = bbox.x + bbox.width / 2;
        const centerY = bbox.y + bbox.height / 2;
        
        const isSmall = (el.tagName === 'circle');
        const zoom = isSmall ? 5 : 2.5;

        wrapper.style.transformOrigin = `${centerX}px ${centerY}px`;
        wrapper.style.transform = `scale(${zoom})`;

        document.getElementById('selection-text').innerText = "¿Es " + el.getAttribute('data-name') + "?";
        ui.style.display = "block";
    }

    function checkSelection() {
        if (selectedEl.id === target.id) {
            alert("¡CORRECTO!");
            selectedEl.style.fill = "var(--correct)";
            setTimeout(resetGame, 800);
        } else {
            alert("Ese es " + selectedEl.getAttribute('data-name'));
            cancelSelection();
        }
    }

    function cancelSelection() {
        if (selectedEl) selectedEl.style.fill = "";
        selectedEl = null;
        ui.style.display = "none";
        wrapper.style.transform = "scale(1)";
    }

    function resetGame() {
        cancelSelection();
        init();
    }

    init();
</script>
</body>
</html>
